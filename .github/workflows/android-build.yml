name: Build Unchained TorBox Minimal

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'
      
      - name: Setup Android SDK
        run: |
          ANDROID_SDK=/usr/local/lib/android/sdk
          echo "ANDROID_HOME=${ANDROID_SDK}" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK}" >> $GITHUB_ENV
      
      - name: Create local.properties
        run: echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties
      
      - name: Make gradlew executable
        run: chmod +x gradlew
      
      - name: Clean
        run: ./gradlew clean
      
      - name: Build APK
        run: ./gradlew app:assembleDebug --no-daemon --stacktrace
      
      - name: Check APK
        run: |
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            echo "✅ APK found!"
            ls -lh app/build/outputs/apk/debug/app-debug.apk
          else
            echo "❌ APK not found"
            find app -name "*.apk" -o -name "outputs" -type d
            exit 1
          fi
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: unchained-torbox-apk
          path: app/build/outputs/apk/debug/app-debug.apk
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          files: app/build/outputs/apk/debug/app-debug.apk
          body: |
            Build #${{ github.run_number }}
            Unchained TorBox Minimal - Debug APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
