name: Build Unchained TorBox Minimal

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 36
          build-tools: 36.0.0
          ndk: '27.2.12479018'
      
      - name: Create local.properties
        run: |
          SDK_PATH=$(echo "$ANDROID_SDK_ROOT")
          echo "sdk.dir=${SDK_PATH}" > local.properties
          echo "Built local.properties:"
          cat local.properties
      
      - name: Make gradlew executable
        run: chmod +x gradlew
      
      - name: Build APK
        run: |
          ./gradlew app:assembleDebug \
            --no-daemon \
            --stacktrace
      
      - name: Verify APK
        run: |
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            ls -lh "$APK_PATH"
            echo "✅ Build successful!"
          else
            echo "❌ APK not found at $APK_PATH"
            echo "Contents of app/build:"
            ls -la app/build/outputs/apk/ 2>/dev/null || echo "outputs/apk/ does not exist"
            exit 1
          fi
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: unchained-torbox-apk
          path: app/build/outputs/apk/debug/app-debug.apk
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          files: app/build/outputs/apk/debug/app-debug.apk
          body: |
            Build #${{ github.run_number }}
            Unchained TorBox Minimal APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
