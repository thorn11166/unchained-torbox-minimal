name: Build Unchained TorBox Minimal

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'
      
      - name: Locate Android SDK
        run: |
          ANDROID_SDK=/usr/local/lib/android/sdk
          echo "ANDROID_HOME=${ANDROID_SDK}" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK}" >> $GITHUB_ENV
          echo "Android SDK found at: ${ANDROID_SDK}"
          ls -la ${ANDROID_SDK}/ 2>/dev/null | head -10 || echo "SDK directory not found"
      
      - name: Create local.properties
        run: |
          echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties
          cat local.properties
      
      - name: Make gradlew executable
        run: chmod +x gradlew
      
      - name: Debug Env Before Build
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "sdk.dir in local.properties:"
          cat local.properties
          echo ""
          echo "Checking SDK exists:"
          ls -la /usr/local/lib/android/sdk/ 2>/dev/null | head -10 || echo "SDK not found"
      
      - name: Clean Build
        run: ./gradlew clean --stacktrace
      
      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug \
            -x lint \
            -x test \
            --no-daemon \
            --no-build-cache \
            --stacktrace 2>&1 | tee build-output.log
          echo "Exit code: $?"
      
      - name: Verify APK
        run: |
          echo "=== Checking for APK files ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
          echo ""
          echo "=== Full build directory structure ==="
          find app -type d -name "build" 2>/dev/null
          echo ""
          echo "=== build/outputs directory contents ==="
          find app -path "*/build/outputs" -type d 2>/dev/null
          echo ""
          echo "=== All files in app directory ==="
          find app -type f -name "*.apk" -o -name "build.log" 2>/dev/null | head -20
      
      - name: Upload APK to artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unchained-torbox-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
      
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build-output.log
      
      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
          tag_name: build-${{ github.run_number }}
          body: |
            Build #${{ github.run_number }}
            Commit: ${{ github.sha }}
            
            Unchained TorBox Minimal APK - Ready for testing
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
